name: CanMV K230 Build for Release

on:
  push:
    tags: [ "v*" ]

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Setup SSH
        run: |
          # configure git
          git config --global user.name kendryte747
          git config --global user.email kendryte747@gmail.com
          # update ssh key
          mkdir -p ~/.ssh
          echo "${{ secrets.ACTIONS_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install repo
        run: |
          # install repo
          mkdir -p ~/.bin/
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod +x ~/.bin/repo

      - name: Prepare code
        run: |
          rm -rf *
          ls -alh
          ~/.bin/repo init -u git@github.com:canmv-k230/manifest.git -m canmv_${{ github.ref_name }}.xml
          ~/.bin/repo sync

      - name: Prepare Environment
        run: |
          sudo apt update
          sudo apt install -y bison flex gcc libncurses5-dev pkg-config \
            libconfuse-dev libssl-dev python3 python3-pip python-is-python3 python3-venv \
            cmake libyaml-dev scons mtools bzip2
          python3 -m venv ~/.canmv_venv
          source ~/.canmv_venv/bin/activate
          pip3 install pycryptodome gmssl jsonschema jinja2

      - name: Download toolchains
        run: |
          make dl_toolchain

      - name: Build Projects
        run: |
          source ~/.canmv_venv/bin/activate
          # Create a clean directory for final assets
          mkdir -p release_assets

          projects=(
            "k230_canmv_01studio_defconfig"
            "k230_canmv_01studio_emmc_defconfig"
            "k230_canmv_dongshanpi_defconfig"
            "k230_canmv_gt6700_defconfig"
            "k230_canmv_hiwonder_defconfig"
            "k230_canmv_lckfb_defconfig"
            "k230_canmv_rtt_evb_defconfig"
            "k230_canmv_v1p0p1_defconfig"
            "k230_canmv_v3p0_defconfig"
            "k230_canmv_wondermk_defconfig"
            "k230_canmv_yahboom_defconfig"
            "k230d_canmv_atk_dnk230d_defconfig"
            "k230d_canmv_bpi_zero_defconfig"
            "k230d_canmv_junroc_ai_cam_defconfig"
          )

          echo "Total projects to build: ${#projects[@]}"

          for proj in ${projects[@]};do
            echo "-------------------"
            echo "Building project: ${proj}"
            echo "-------------------"

            # Build the project
            make ${proj}
            time make -j8

            # 1. Copy the specific images and md5 files to our safe folder
            # Using find to handle the nested structure within output/
            find output/ -name "*.img.gz" -exec cp {} release_assets/ \;
            find output/ -name "*.img.gz.md5" -exec cp {} release_assets/ \;

            # 2. Wipe the output folder to free up space for the next build
            rm -rf output/

            echo "Cleaned up ${proj} build files."
          done

      - name: Generate release.xml
        run: |
          ~/.bin/repo manifest -r -o release_assets/release_${{ github.ref_name }}.xml

      - name: Upload images to Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release_assets/*.img.gz
            release_assets/*.img.gz.md5
          generate_release_notes: true
